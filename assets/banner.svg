<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Animated / Glowing Network Connections -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5">
    <line x1="150" y1="100" x2="300" y2="80" />
    <line x1="300" y1="80" x2="450" y2="150" />
    <line x1="450" y1="150" x2="350" y2="280" />
    <line x1="350" y1="280" x2="150" y2="250" />
    <line x1="150" y1="250" x2="150" y2="100" />
    <line x1="150" y1="100" x2="350" y2="280" />
    <line x1="300" y1="80" x2="150" y2="250" />
    
    <!-- Right side network -->
    <line x1="850" y1="120" x2="1050" y2="90" />
    <line x1="1050" y1="90" x2="1100" y2="260" />
    <line x1="1100" y1="260" x2="920" y2="310" />
    <line x1="920" y1="310" x2="800" y2="220" />
    <line x1="800" y1="220" x2="850" y2="120" />
    <line x1="850" y1="120" x2="920" y2="310" />
    <line x1="1050" y1="90" x2="800" y2="220" />
  </g>
  
  <!-- Glowing paths -->
  <g stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)" fill="none">
    <path d="M 150 100 Q 250 50 300 80 T 450 150 T 350 280 T 150 250 Z" stroke-dasharray="1000" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1000;0" dur="8s" repeatCount="indefinite" />
    </path>
    <path d="M 850 120 Q 950 60 1050 90 T 1100 260 T 920 310 T 800 220 Z" stroke-dasharray="1000" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="0;1000" dur="8s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Nodes -->
  <g fill="#38bdf8" filter="url(#glow)">
    <circle cx="150" cy="100" r="8" />
    <circle cx="300" cy="80" r="10" fill="#a855f7" />
    <circle cx="450" cy="150" r="9" fill="#ec4899" />
    <circle cx="350" cy="280" r="8" />
    <circle cx="150" cy="250" r="7" fill="#a855f7" />
    
    <circle cx="850" cy="120" r="8" fill="#ec4899" />
    <circle cx="1050" cy="90" r="9" />
    <circle cx="1100" cy="260" r="11" fill="#a855f7" />
    <circle cx="920" cy="310" r="8" />
    <circle cx="800" cy="220" r="7" fill="#38bdf8" />
  </g>

  <!-- Title Text -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="56" fill="url(#accentGrad)" filter="url(#glow)">
    AWESOME GNNs
  </text>
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="20" fill="#94a3b8" letter-spacing="4">
    GRAPH NEURAL NETWORKS LANDSCAPE
  </text>
</svg>
